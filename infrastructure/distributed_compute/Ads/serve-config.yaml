# This file was generated using the `serve build` command on Ray v2.54.0.

proxy_location: EveryNode

http_options:
  host: 0.0.0.0
  port: 8000

grpc_options:
  port: 9000
  grpc_servicer_functions: []

logging_config:
  encoding: TEXT
  log_level: INFO
  logs_dir: null
  enable_access_log: true
  additional_log_standard_attrs: []

applications:
- name: app1
  route_prefix: /
  import_path: serve_mmoe:app
  runtime_env: {}
  deployments:
  - name: ExpertShard
    num_replicas: 4
    max_ongoing_requests: 512
    ray_actor_options:
      num_cpus: 1.0
      resources:
        expert-resource: 1
    max_replicas_per_node: 1
  - name: Ranker
    num_replicas: 5
    max_ongoing_requests: 32
    ray_actor_options:
      num_cpus: 0.5
      resources:
        shared-resource: 0.2
